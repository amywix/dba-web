<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Done By Amy — Hours Back</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #1a0b2e; }
  .ad {
    width: 100vw; height: 100vh;
    background: #1a0b2e;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
    box-sizing: border-box;
    position: relative;
  }
  .glow {
    position: absolute; bottom: -30vh; left: -20vw;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(217,70,239,0.22), transparent 60%);
    pointer-events: none;
  }
  .logo img { height: 5vh; width: auto; display: block; position: relative; z-index: 1; }
  .middle { display: flex; flex-direction: column; gap: 3vh; position: relative; z-index: 1; }
  .headline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 9.5vw;
    line-height: 1;
    color: #ffffff;
    letter-spacing: -0.03em;
  }
  .headline .big { font-size: 14vw; color: #D946EF; display: block; line-height: 0.95; }
  .benefit {
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 2.6vw;
    line-height: 1.4;
    color: rgba(255,255,255,0.8);
    max-width: 85%;
  }
  .cta {
    align-self: flex-start;
    background: #ffffff;
    color: #1a0b2e;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 2.4vw;
    padding: 2.2vh 5vw;
    border-radius: 1.2vw;
    text-decoration: none;
  }
  .footer {
    font-family: 'Poppins', sans-serif;
    font-size: 1.6vw;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="glow"></div>
    <div class="logo">
      <img src="/__mockup/images/dba_logo.png" alt="Done By Amy" />
    </div>
    <div class="middle">
      <div class="headline"><span class="big">12 hours</span>back every week.</div>
      <div class="benefit">AI handles admin, quotes, and follow-ups so you can do the work you love.</div>
      <a class="cta" href="#">See What's Possible →</a>
    </div>
    <span class="footer">doneByAmy.com.au</span>
  </div>
</body>
</html>
