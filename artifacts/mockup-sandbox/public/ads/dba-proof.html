<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Done By Amy — Yard Yakka Case Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0e0e11; }
  .ad {
    width: 100vw; height: 100vh;
    background: #0e0e11;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
    box-sizing: border-box;
    position: relative;
  }
  .glow {
    position: absolute; top: -25vh; left: -25vw;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(168,85,247,0.22), transparent 60%);
    pointer-events: none;
  }
  .logo img { height: 5vh; width: auto; display: block; position: relative; z-index: 1; }
  .middle { display: flex; flex-direction: column; gap: 3vh; position: relative; z-index: 1; }
  .kicker {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 1.8vw;
    color: #A855F7;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .headline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 8.5vw;
    line-height: 1.02;
    color: #ffffff;
    letter-spacing: -0.03em;
  }
  .headline .big { font-size: 16vw; color: #D946EF; display: inline-block; line-height: 0.9; }
  .benefit {
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 2.6vw;
    line-height: 1.4;
    color: rgba(255,255,255,0.8);
    max-width: 85%;
  }
  .cta {
    align-self: flex-start;
    background: #A855F7;
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 2.4vw;
    padding: 2.2vh 5vw;
    border-radius: 1.2vw;
    text-decoration: none;
  }
  .footer {
    font-family: 'Poppins', sans-serif;
    font-size: 1.6vw;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="glow"></div>
    <div class="logo">
      <img src="/__mockup/images/dba_logo.png" alt="Done By Amy" />
    </div>
    <div class="middle">
      <div class="kicker">Case Study · Yard Yakka</div>
      <div class="headline"><span class="big">+22</span><br/>extra jobs in 90 days.</div>
      <div class="benefit">See how one Aussie landscaping crew turned missed calls into paid work.</div>
      <a class="cta" href="#">Read the Case Study →</a>
    </div>
    <span class="footer">doneByAmy.com.au</span>
  </div>
</body>
</html>
