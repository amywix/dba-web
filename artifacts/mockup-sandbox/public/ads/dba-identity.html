<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Done By Amy — Built for Aussie SMBs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #2D1B4E; }
  .ad {
    width: 100vw; height: 100vh;
    background: #2D1B4E;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
    box-sizing: border-box;
    position: relative;
  }
  .glow {
    position: absolute; top: 30vh; right: -25vw;
    width: 75vw; height: 75vw;
    background: radial-gradient(circle, rgba(124,58,237,0.35), transparent 60%);
    pointer-events: none;
  }
  .logo img { height: 5vh; width: auto; display: block; position: relative; z-index: 1; }
  .middle { display: flex; flex-direction: column; gap: 3vh; position: relative; z-index: 1; }
  .badge {
    align-self: flex-start;
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 1.8vw;
    color: #D946EF;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .headline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 8vw;
    line-height: 1.05;
    color: #ffffff;
    letter-spacing: -0.02em;
  }
  .benefit {
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 2.6vw;
    line-height: 1.4;
    color: rgba(255,255,255,0.8);
    max-width: 80%;
  }
  .cta {
    align-self: flex-start;
    background: #7C3AED;
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 2.4vw;
    padding: 2.2vh 5vw;
    border-radius: 1.2vw;
    text-decoration: none;
  }
  .footer {
    font-family: 'Poppins', sans-serif;
    font-size: 1.6vw;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
  <div class="ad">
    <div class="glow"></div>
    <div class="logo">
      <img src="/__mockup/images/dba_logo.png" alt="Done By Amy" />
    </div>
    <div class="middle">
      <div class="badge">For Aussie Small Business</div>
      <div class="headline">AI automation, without the tech headache.</div>
      <div class="benefit">No jargon. No bloated stack. Just systems that work from day one.</div>
      <a class="cta" href="#">Book a Free Audit →</a>
    </div>
    <span class="footer">doneByAmy.com.au</span>
  </div>
</body>
</html>
