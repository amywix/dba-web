kind = "video"
previewPath = "/ad-2/"
title = "Done By Amy — Chatbot Ad 2"
version = "1.0.0"
id = "artifacts/ad-chatbot-2"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ad-2/" ]
localPort = 20737

[services.development]
run = "pnpm --filter @workspace/ad-chatbot-2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ad-chatbot-2", "run", "build" ]
publicDir = "artifacts/ad-chatbot-2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20737"
BASE_PATH = "/ad-2/"
